    .node-accent { fill: #e6f4f1; stroke: #9bd2cb; }
    .arrow { stroke: #0f766e; stroke-width: 1.5; marker-end: url(#arrow); }
    .dash { stroke-dasharray: 6 4; }
  </style>
</head>
<body>
<div class="layout">

  <main>
    <section>
      <h2>Sequence Flows</h2>
      <h3>Assign Tenant to Apartment</h3>
      <div class="diagram">
        <svg width="1100" height="340" viewBox="0 0 1100 340" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto">
              <path d="M0,0 L10,3 L0,6" fill="#0f766e" />
            </marker>
          </defs>
          <rect class="node" x="40" y="20" width="160" height="40" rx="8" />
          <text x="70" y="45">Admin UI</text>

          <rect class="node-accent" x="260" y="20" width="180" height="40" rx="8" />
          <text x="285" y="45">Controller</text>

          <rect class="node" x="500" y="20" width="170" height="40" rx="8" />
          <text x="535" y="45">Repository</text>

          <rect class="node" x="720" y="20" width="180" height="40" rx="8" />
          <text x="760" y="45">API</text>

          <rect class="node" x="950" y="20" width="120" height="40" rx="8" />
          <text x="970" y="45">DB</text>

          <line class="arrow" x1="200" y1="40" x2="260" y2="40" />
          <line class="arrow" x1="440" y1="40" x2="500" y2="40" />
          <line class="arrow" x1="670" y1="40" x2="720" y2="40" />
          <line class="arrow" x1="900" y1="40" x2="950" y2="40" />

          <line class="arrow dash" x1="950" y1="80" x2="720" y2="140" />
          <line class="arrow dash" x1="720" y1="140" x2="500" y2="180" />
          <line class="arrow dash" x1="500" y1="180" x2="260" y2="220" />
          <line class="arrow dash" x1="260" y1="220" x2="120" y2="260" />

          <text x="740" y="130">Lease created</text>
          <text x="740" y="150">Apartment occupied</text>
          <text x="740" y="170">Tenant user created if needed</text>

          <rect class="node" x="40" y="240" width="200" height="50" rx="8" />
          <text x="70" y="270">UI Updates</text>
        </svg>
      </div>

      <h3>Tenant Creates Maintenance Request</h3>
      <div class="diagram">
        <svg width="1100" height="320" viewBox="0 0 1100 320" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto">
              <path d="M0,0 L10,3 L0,6" fill="#0f766e" />
            </marker>
          </defs>
          <rect class="node" x="40" y="20" width="160" height="40" rx="8" />
          <text x="70" y="45">Tenant UI</text>

          <rect class="node-accent" x="260" y="20" width="180" height="40" rx="8" />
          <text x="285" y="45">Controller</text>

          <rect class="node" x="500" y="20" width="170" height="40" rx="8" />
          <text x="535" y="45">Repository</text>

          <rect class="node" x="720" y="20" width="180" height="40" rx="8" />
          <text x="760" y="45">API</text>

          <line class="arrow" x1="200" y1="40" x2="260" y2="40" />
          <line class="arrow" x1="440" y1="40" x2="500" y2="40" />
          <line class="arrow" x1="670" y1="40" x2="720" y2="40" />

          <line class="arrow dash" x1="720" y1="80" x2="500" y2="140" />
          <line class="arrow dash" x1="500" y1="140" x2="260" y2="190" />
          <line class="arrow dash" x1="260" y1="190" x2="120" y2="240" />

          <text x="730" y="120">Request created</text>

          <rect class="node" x="40" y="220" width="200" height="50" rx="8" />
          <text x="70" y="250">UI Updates</text>
        </svg>
      </div>
